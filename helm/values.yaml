# Default values for sd-anti-money-laundering (BIAN Service Domain: Anti Money Laundering)

image:
  repository: bian/sd-anti-money-laundering
  tag: "0.1.0"
  pullPolicy: IfNotPresent

replicaCount: 1

# Namespace is set per BIAN business area by deploy-all.sh (helm -n <ns>).
# These labels ride on every object for mesh policy + observability slicing.
bian:
  serviceDomain: "anti-money-laundering"
  businessArea: "risk-and-compliance"
  businessDomain: "financial-crime"
  functionalPattern: "monitor"

service:
  port: 8080

resources:
  requests:
    cpu: 50m
    memory: 256Mi
  limits:
    memory: 512Mi

# Gateway API route (Cilium implements Gateway API natively — no ingress controller)
route:
  enabled: true
  gatewayName: bian-gateway
  gatewayNamespace: bian-system
  # External path prefix; rewritten to / before hitting the service
  pathPrefix: /sd-anti-money-laundering

# CiliumNetworkPolicy — default-deny posture, explicit allows
networkPolicy:
  enabled: true
  monitoringNamespace: monitoring
